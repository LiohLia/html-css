<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alinhamento vertical</title>
    <style>
        #container {
            background-image: url('imagens/wallpaper004.jpg');
            position: relative;
            background-size: 100% 100%;
            height: 300px;
            background-color: purple;
            padding: 10px;
        }
        #conteudo {
            background-image: url('imagens/wallpaper004.jpg');
            background-size: 100% 100%;
            position: absolute;
            height: 200px;
            width: 400px;
            background-color: rgb(240, 217, 10);

            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="conteudo">

        </div>
    </div>
    
</body>
</html>
